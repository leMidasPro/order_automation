<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Facture</title>
    <style>
        body {
            font-family: Arial;
            max-width: 400px;
            margin: auto;
        }
        .box {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
        }
        hr {
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🧾 Facture</h2>

    <p><strong>Commande #{{ order_id }}</strong></p>

    <hr>

    <p>🍽 Plat : {{ product }}</p>
    <p>🔢 Quantité : {{ quantity }}</p>
    <p>💵 Prix : {{ unit_price }} FCFA</p>

    <hr>

    <h3>💰 Total : {{ total }} FCFA</h3>

    <hr>

    <p>📞 Client : {{ phone }}</p>
    <p>📍 Adresse : {{ location }}</p>

    <hr>

    <p>🚚 Statut : {{ status }}</p>
</div>

</body>
</html>
